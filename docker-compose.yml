services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  api:
    build:
      context: ./apps/api
    env_file:
      - .env
    depends_on:
      - db
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api:/usr/src/app
    command: npm run start:dev
    networks:
      - app-network

  web:
    build:
      context: ./apps/web
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/usr/src/app
    command: npm run dev
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge